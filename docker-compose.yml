services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-wisesales}
      POSTGRES_USER: ${DB_USER:-wisesales}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wisesales123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql

  backend:
    build:
      context: ./backend
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-wisesales}
      DB_USER: ${DB_USER:-wisesales}
      DB_PASSWORD: ${DB_PASSWORD:-wisesales123}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"

volumes:
  pgdata:
